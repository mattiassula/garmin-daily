name: Garmin Sync Daily

on:
  workflow_dispatch: # Permette l'avvio manuale
  schedule:
    - [cite_start]cron: '0 6 * * *' # Parte in automatico ogni mattina alle 6:00 UTC [cite: 50]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Installazione dipendenze
        run: pip install garmin-daily
      - name: Esecuzione Sincronizzazione
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          echo "$CLIENT_SECRET" > client_secret.json
          python -m garmin_daily --sheets "1yXJYl4nEsuj5SBAgCwPiCWYgmrnOXUWSPW5J50nyApI"
